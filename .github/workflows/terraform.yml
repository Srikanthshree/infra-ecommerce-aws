name: "Terraform Infrastructure CI/CD (with OIDC debug)"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"

jobs:
  # ---------------------------------------------------------
  # IaC security scan (unchanged)
  # ---------------------------------------------------------
  iac-security-scan:
    name: "IaC Security Scan (Trivy + tfsec)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Trivy — IaC misconfiguration scan"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: "Upload Trivy IaC results → GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-iac.sarif"
          category: "trivy-iac"

      - name: "tfsec — Terraform security analysis"
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          format: sarif
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # Terraform Validate & Plan (with OIDC debug)
  # ---------------------------------------------------------
  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: iac-security-scan
    permissions:
      id-token: write
      contents: read
    

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      # -------------------------
      # Debug: fetch and decode OIDC id token
      # -------------------------
      - name: "Debug: fetch and decode OIDC id token"
        shell: bash
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          set -euo pipefail

          echo "Requesting id token for audience sts.amazonaws.com"
          TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          ID_TOKEN=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$TOKEN_URL")

          # Truncate raw token in logs for safety
          echo "---- raw token (truncated) ----"
          echo "${ID_TOKEN:0:80}...${ID_TOKEN: -80}"

          # Save token to file for later CLI tests (do not print file contents)
          printf '%s' "$ID_TOKEN" > id_token.jwt
          chmod 600 id_token.jwt

          # Decode payload (2nd part of JWT)
          PAYLOAD_B64=$(echo "$ID_TOKEN" | cut -d'.' -f2)
          PAD=$((4 - ${#PAYLOAD_B64} % 4))
          if [ $PAD -lt 4 ]; then PAYLOAD_B64="${PAYLOAD_B64}$(printf '=%.0s' $(seq 1 $PAD))"; fi

          echo "---- decoded claims ----"
          echo "$PAYLOAD_B64" | tr '_-' '/+' | base64 --decode | jq .

      # -------------------------
      # Direct AWS CLI test: assume-role-with-web-identity using the raw token
      # -------------------------
      - name: "Debug: attempt aws sts assume-role-with-web-identity"
        shell: bash
        env:
          ROLE_ARN: ${{ secrets.AWS_IAM_ARN }}
        run: |
          set -euo pipefail
          echo "Attempting aws sts assume-role-with-web-identity (diagnostic)."
          # Use a short duration to limit exposure
          if ! aws sts assume-role-with-web-identity \
            --role-arn "$ROLE_ARN" \
            --role-session-name "gh-debug-$(date +%s)" \
            --web-identity-token file://id_token.jwt \
            --duration-seconds 900 \
            --output json > assume-output.json 2>&1; then
            echo "assume-role-with-web-identity failed; printing error snippet:"
            jq -r '. | {Error: .}' assume-output.json || cat assume-output.json
            exit 0
          fi

          echo "assume-role-with-web-identity succeeded; extracting temporary creds (masked in logs)."
          AWS_ACCESS_KEY_ID=$(jq -r '.Credentials.AccessKeyId' assume-output.json)
          AWS_SECRET_ACCESS_KEY=$(jq -r '.Credentials.SecretAccessKey' assume-output.json)
          AWS_SESSION_TOKEN=$(jq -r '.Credentials.SessionToken' assume-output.json)

          # Use the returned temporary creds to call get-caller-identity
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          echo "Caller identity using temporary creds from assume-role-with-web-identity:"
          aws sts get-caller-identity --output json

      # -------------------------
      # Configure AWS credentials via the official action (normal path)
      # -------------------------
      - name: "Configure AWS credentials via OIDC (action)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFPlan-${{ github.run_number }}"

      # -------------------------
      # Verify what AWS sees after the action (caller identity)
      # -------------------------
      - name: "Debug: AWS caller identity (after action)"
        shell: bash
        run: |
          set -euo pipefail
          echo "Environment variables (filtered):"
          env | grep -E 'AWS|GITHUB' || true

          echo "Caller identity (after configure-aws-credentials action):"
          aws sts get-caller-identity --output json || true

      # -------------------------
      # Terraform setup and plan (unchanged)
      # -------------------------
      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Format Check"
        run: terraform fmt -check -recursive

      - name: "Terraform Init"
        run: terraform init -input=false

      - name: "Terraform Validate"
        run: terraform validate

      - name: "Terraform Plan"
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            -input=false
        env:
          TF_VAR_github_org: ${{ vars.GITHUB_ORG }}

      - name: "Upload Terraform plan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  # ---------------------------------------------------------
  # Terraform Apply (production) — unchanged except permissions
  # ---------------------------------------------------------
  terraform-apply:
    name: "Terraform Apply (production)"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFApply-${{ github.run_number }}"

      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Init"
        run: terraform init -input=false

      - name: "Download Terraform plan artifact"
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: "Terraform Apply"
        run: terraform apply -auto-approve -input=false tfplan
