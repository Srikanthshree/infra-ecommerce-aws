name: "Terraform Infrastructure CI/CD"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"

jobs:
  iac-security-scan:
    name: "IaC Security Scan (Trivy + tfsec)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy — IaC misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy IaC results → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-iac.sarif"
          category: "trivy-iac"

      - name: tfsec — Terraform security analysis
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true     # report findings in Security tab but do not block pipeline
          format: sarif
          github_token: ${{ secrets.GITHUB_TOKEN }}

  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: iac-security-scan
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug fetch raw OIDC id token and decode claims
        shell: bash
        run: |
          set -euo pipefail
          echo "Requesting id token for audience sts.amazonaws.com"
          TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"

          # Endpoint returns JSON: {"value":"<JWT>"}
          RAW_JSON=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$TOKEN_URL")
          echo "---- raw response (truncated) ----"
          echo "${RAW_JSON:0:120}...${RAW_JSON: -120}"

          # Extract raw JWT from JSON response
          ID_TOKEN=$(printf '%s' "$RAW_JSON" | jq -r '.value')
          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "ERROR: id token not found in response"
            printf '%s\n' "$RAW_JSON"
            exit 1
          fi

          # Save raw JWT to file (file contains only the JWT)
          printf '%s' "$ID_TOKEN" > id_token.jwt
          chmod 600 id_token.jwt

          # Decode payload (2nd part of JWT) and print claims
          PAYLOAD_B64=$(printf '%s' "$ID_TOKEN" | cut -d'.' -f2)
          PAD=$((4 - ${#PAYLOAD_B64} % 4))
          if [ $PAD -lt 4 ]; then PAYLOAD_B64="${PAYLOAD_B64}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          echo "---- decoded claims ----"
          printf '%s' "$PAYLOAD_B64" | tr '_-' '/+' | base64 --decode | jq .

      - name: Debug direct aws sts assume-role-with-web-identity (diagnostic)
        shell: bash
        env:
          ROLE_ARN: ${{ secrets.AWS_IAM_ARN }}
        run: |
          set -euo pipefail
          echo "Attempting aws sts assume-role-with-web-identity using id_token.jwt"
          if ! aws sts assume-role-with-web-identity \
            --role-arn "$ROLE_ARN" \
            --role-session-name "gh-debug-$(date +%s)" \
            --web-identity-token file://id_token.jwt \
            --duration-seconds 900 \
            --output json > assume-output.json 2>&1; then
            echo "assume-role-with-web-identity failed; printing error snippet:"
            if jq -e . >/dev/null 2>&1 < assume-output.json; then
              jq -r '. | {Error: .}' assume-output.json
            else
              sed -n '1,200p' assume-output.json
            fi
            echo "Continuing to run the official action for comparison..."
          else
            echo "assume-role-with-web-identity succeeded; extracting temporary creds (masked)"
            AWS_ACCESS_KEY_ID=$(jq -r '.Credentials.AccessKeyId' assume-output.json)
            AWS_SECRET_ACCESS_KEY=$(jq -r '.Credentials.SecretAccessKey' assume-output.json)
            AWS_SESSION_TOKEN=$(jq -r '.Credentials.SessionToken' assume-output.json)
            export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            echo "Caller identity using temporary creds from assume-role-with-web-identity:"
            aws sts get-caller-identity --output json
            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          fi

      - name: Configure AWS credentials via OIDC (official action)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFPlan-${{ github.run_number }}"

      - name: Debug AWS caller identity after action
        shell: bash
        run: |
          set -euo pipefail
          echo "Filtered env (AWS/GITHUB):"
          env | grep -E 'AWS|GITHUB' || true
          echo "Caller identity (after configure-aws-credentials action):"
          aws sts get-caller-identity --output json || true

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            -input=false
        # No env vars needed — all variables have defaults in variables.tf
        # (github_org defaults to "Srikanthshree", etc.)

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  terraform-apply:
    name: "Terraform Apply (production)"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print OIDC sub claim (diagnostic — shows exact value AWS evaluates)
        shell: bash
        run: |
          set -euo pipefail
          TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          ID_TOKEN=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$TOKEN_URL" | jq -r '.value')
          PAYLOAD=$(printf '%s' "$ID_TOKEN" | cut -d'.' -f2)
          PAD=$((4 - ${#PAYLOAD} % 4)); [ $PAD -lt 4 ] && PAYLOAD="${PAYLOAD}$(printf '=%.0s' $(seq 1 $PAD))"
          echo "=== OIDC claims for THIS job ==="
          printf '%s' "$PAYLOAD" | tr '_-' '/+' | base64 --decode | jq '{sub,aud,iss,repository,environment,ref,job_workflow_ref}'
          echo "=== Trust policy must match the sub value above ==="

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFApply-${{ github.run_number }}"

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      # ── Pre-apply: delete orphaned AWS resources that block fresh creation ───
      # These resources survive destroy+apply cycles when they were created by
      # a previous partial apply but removed from Terraform state, so terraform
      # destroy never knew about them. All operations use || true (idempotent).
      - name: "Pre-apply cleanup: remove orphaned resources"
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "=== 1. Secrets Manager pending-deletion secret ==="
          DELETED_DATE=$(aws secretsmanager describe-secret \
            --secret-id "ecommerce/prod/db-credentials" \
            --query 'DeletedDate' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$DELETED_DATE" != "NOT_FOUND" ] && [ "$DELETED_DATE" != "None" ]; then
            echo "  Force-deleting pending secret..."
            aws secretsmanager delete-secret \
              --secret-id "ecommerce/prod/db-credentials" \
              --force-delete-without-recovery --output json || true
            sleep 5
          else
            echo "  Secret OK (status: $DELETED_DATE)"
          fi

          echo "=== 2. RDS DB Parameter Group ==="
          aws rds describe-db-parameter-groups \
            --db-parameter-group-name "ecommerce-pg15-params" \
            --output text > /dev/null 2>&1 \
            && { echo "  Exists — deleting..."; \
                 aws rds delete-db-parameter-group \
                   --db-parameter-group-name "ecommerce-pg15-params" || true; \
                 sleep 3; } \
            || echo "  Not found — OK."

          echo "=== 3. IAM managed policy ==="
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/ecommerce-app-db-secrets-read-policy"
          if aws iam get-policy --policy-arn "$POLICY_ARN" --output text > /dev/null 2>&1; then
            echo "  Exists — detaching all roles and deleting..."
            ROLES=$(aws iam list-entities-for-policy --policy-arn "$POLICY_ARN" \
              --query 'PolicyRoles[].RoleName' --output text 2>/dev/null || echo "")
            for role in $ROLES; do
              [ -z "$role" ] && continue
              aws iam detach-role-policy --role-name "$role" \
                --policy-arn "$POLICY_ARN" || true
            done
            aws iam delete-policy --policy-arn "$POLICY_ARN" || true
          else
            echo "  Not found — OK."
          fi

          echo "=== 4. IAM roles ==="
          for ROLE in ecommerce-vpc-flow-log-role ecommerce-eks-cluster-role \
                      ecommerce-eks-nodes-role ecommerce-app-irsa-role \
                      ecommerce-rds-monitoring-role; do
            if aws iam get-role --role-name "$ROLE" --output text > /dev/null 2>&1; then
              echo "  $ROLE exists — cleaning up..."
              # remove inline policies
              INLINE=$(aws iam list-role-policies --role-name "$ROLE" \
                --query 'PolicyNames' --output text 2>/dev/null || echo "")
              for p in $INLINE; do
                [ -z "$p" ] && continue
                aws iam delete-role-policy --role-name "$ROLE" --policy-name "$p" || true
              done
              # detach managed policies
              ATTACHED=$(aws iam list-attached-role-policies --role-name "$ROLE" \
                --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null || echo "")
              for arn in $ATTACHED; do
                [ -z "$arn" ] && continue
                aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$arn" || true
              done
              # remove instance profiles if any
              PROFILES=$(aws iam list-instance-profiles-for-role --role-name "$ROLE" \
                --query 'InstanceProfiles[].InstanceProfileName' --output text 2>/dev/null || echo "")
              for prof in $PROFILES; do
                [ -z "$prof" ] && continue
                aws iam remove-role-from-instance-profile --instance-profile-name "$prof" \
                  --role-name "$ROLE" || true
              done
              aws iam delete-role --role-name "$ROLE" || true
              echo "  $ROLE deleted."
            else
              echo "  $ROLE not found — OK."
            fi
          done

          echo "=== 5. CloudWatch log groups ==="
          for LG in "/aws/eks/ecommerce-eks/cluster" "/aws/vpc/flowlogs/ecommerce"; do
            EXISTS=$(aws logs describe-log-groups --log-group-name-prefix "$LG" \
              --query "logGroups[?logGroupName=='$LG'].logGroupName" \
              --output text 2>/dev/null || echo "")
            if [ "$EXISTS" = "$LG" ]; then
              echo "  $LG exists — deleting..."
              aws logs delete-log-group --log-group-name "$LG" || true
            else
              echo "  $LG not found — OK."
            fi
          done

          echo "=== Pre-apply cleanup complete ==="

      - name: Terraform Apply
        id: tf_apply
        continue-on-error: true
        env:
          TF_LOG: ERROR
        run: |
          terraform apply -auto-approve -input=false tfplan 2>&1 | tee terraform-apply.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload apply log (always — shows exact error on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-log
          path: terraform-apply.log
          retention-days: 3

      - name: Fail if apply failed
        if: steps.tf_apply.outputs.exit_code != '0'
        run: exit 1
