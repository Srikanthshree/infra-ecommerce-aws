name: "Terraform Infrastructure CI/CD"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"

jobs:
  iac-security-scan:
    name: "IaC Security Scan (Trivy + tfsec)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy — IaC misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy IaC results → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-iac.sarif"
          category: "trivy-iac"

      - name: tfsec — Terraform security analysis
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true     # report findings in Security tab but do not block pipeline
          format: sarif
          github_token: ${{ secrets.GITHUB_TOKEN }}

  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: iac-security-scan
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug fetch raw OIDC id token and decode claims
        shell: bash
        run: |
          set -euo pipefail
          echo "Requesting id token for audience sts.amazonaws.com"
          TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"

          # Endpoint returns JSON: {"value":"<JWT>"}
          RAW_JSON=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$TOKEN_URL")
          echo "---- raw response (truncated) ----"
          echo "${RAW_JSON:0:120}...${RAW_JSON: -120}"

          # Extract raw JWT from JSON response
          ID_TOKEN=$(printf '%s' "$RAW_JSON" | jq -r '.value')
          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "ERROR: id token not found in response"
            printf '%s\n' "$RAW_JSON"
            exit 1
          fi

          # Save raw JWT to file (file contains only the JWT)
          printf '%s' "$ID_TOKEN" > id_token.jwt
          chmod 600 id_token.jwt

          # Decode payload (2nd part of JWT) and print claims
          PAYLOAD_B64=$(printf '%s' "$ID_TOKEN" | cut -d'.' -f2)
          PAD=$((4 - ${#PAYLOAD_B64} % 4))
          if [ $PAD -lt 4 ]; then PAYLOAD_B64="${PAYLOAD_B64}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          echo "---- decoded claims ----"
          printf '%s' "$PAYLOAD_B64" | tr '_-' '/+' | base64 --decode | jq .

      - name: Debug direct aws sts assume-role-with-web-identity (diagnostic)
        shell: bash
        env:
          ROLE_ARN: ${{ secrets.AWS_IAM_ARN }}
        run: |
          set -euo pipefail
          echo "Attempting aws sts assume-role-with-web-identity using id_token.jwt"
          if ! aws sts assume-role-with-web-identity \
            --role-arn "$ROLE_ARN" \
            --role-session-name "gh-debug-$(date +%s)" \
            --web-identity-token file://id_token.jwt \
            --duration-seconds 900 \
            --output json > assume-output.json 2>&1; then
            echo "assume-role-with-web-identity failed; printing error snippet:"
            if jq -e . >/dev/null 2>&1 < assume-output.json; then
              jq -r '. | {Error: .}' assume-output.json
            else
              sed -n '1,200p' assume-output.json
            fi
            echo "Continuing to run the official action for comparison..."
          else
            echo "assume-role-with-web-identity succeeded; extracting temporary creds (masked)"
            AWS_ACCESS_KEY_ID=$(jq -r '.Credentials.AccessKeyId' assume-output.json)
            AWS_SECRET_ACCESS_KEY=$(jq -r '.Credentials.SecretAccessKey' assume-output.json)
            AWS_SESSION_TOKEN=$(jq -r '.Credentials.SessionToken' assume-output.json)
            export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            echo "Caller identity using temporary creds from assume-role-with-web-identity:"
            aws sts get-caller-identity --output json
            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          fi

      - name: Configure AWS credentials via OIDC (official action)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFPlan-${{ github.run_number }}"

      - name: Debug AWS caller identity after action
        shell: bash
        run: |
          set -euo pipefail
          echo "Filtered env (AWS/GITHUB):"
          env | grep -E 'AWS|GITHUB' || true
          echo "Caller identity (after configure-aws-credentials action):"
          aws sts get-caller-identity --output json || true

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Import RDS parameter group if exists outside state
        shell: bash
        run: |
          # The parameter group persists in AWS across failed apply cycles.
          # If it exists in AWS but NOT in state, Terraform tries to CREATE
          # it and gets DBParameterGroupAlreadyExists. Importing it first fixes this.
          PG_NAME="ecommerce-pg15-params"
          if aws rds describe-db-parameter-groups \
              --db-parameter-group-name "$PG_NAME" \
              --output text > /dev/null 2>&1; then
            if ! terraform state list 2>/dev/null | grep -q "module.rds.aws_db_parameter_group"; then
              echo "Parameter group $PG_NAME exists in AWS but not in state - importing..."
              terraform import module.rds.aws_db_parameter_group.this "$PG_NAME" || true
            else
              echo "Parameter group already in state - OK."
            fi
          else
            echo "Parameter group $PG_NAME not found in AWS - Terraform will create it."
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            -input=false
        # No env vars needed — all variables have defaults in variables.tf
        # (github_org defaults to "Srikanthshree", etc.)

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  terraform-apply:
    name: "Terraform Apply (production)"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print OIDC sub claim (diagnostic — shows exact value AWS evaluates)
        shell: bash
        run: |
          set -euo pipefail
          TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          ID_TOKEN=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$TOKEN_URL" | jq -r '.value')
          PAYLOAD=$(printf '%s' "$ID_TOKEN" | cut -d'.' -f2)
          PAD=$((4 - ${#PAYLOAD} % 4)); [ $PAD -lt 4 ] && PAYLOAD="${PAYLOAD}$(printf '=%.0s' $(seq 1 $PAD))"
          echo "=== OIDC claims for THIS job ==="
          printf '%s' "$PAYLOAD" | tr '_-' '/+' | base64 --decode | jq '{sub,aud,iss,repository,environment,ref,job_workflow_ref}'
          echo "=== Trust policy must match the sub value above ==="

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-TFApply-${{ github.run_number }}"

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      # ── Pre-apply: ONLY fix Secrets Manager pending-deletion ─────────────
      # IAM roles, parameter groups, and CloudWatch log groups are managed by
      # Terraform state — deleting them causes 404 errors when Terraform tries
      # to update them. Only the Secrets Manager secret needs manual cleanup
      # because AWS puts it in Pending Deletion for 7 days after terraform destroy.
      - name: "Pre-apply cleanup: fix pending-deletion Secrets Manager secret"
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "=== Secrets Manager: force-delete if in Pending Deletion ==="
          DELETED_DATE=$(aws secretsmanager describe-secret \
            --secret-id "ecommerce/prod/db-credentials" \
            --query 'DeletedDate' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$DELETED_DATE" = "NOT_FOUND" ]; then
            echo "  Secret not found — OK."
          elif [ "$DELETED_DATE" = "None" ]; then
            echo "  Secret exists and active — Terraform will manage it."
          else
            echo "  Secret is Pending Deletion — force-deleting..."
            aws secretsmanager delete-secret \
              --secret-id "ecommerce/prod/db-credentials" \
              --force-delete-without-recovery --output json || true
            sleep 5
          fi
          echo "=== Cleanup complete ==="

      - name: Terraform Apply
        id: tf_apply
        continue-on-error: true
        env:
          TF_LOG: ERROR
        run: |
          terraform apply -auto-approve -input=false tfplan 2>&1 | tee terraform-apply.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload apply log (always — shows exact error on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-log
          path: terraform-apply.log
          retention-days: 3

      - name: Fail if apply failed
        if: steps.tf_apply.outputs.exit_code != '0'
        run: exit 1
